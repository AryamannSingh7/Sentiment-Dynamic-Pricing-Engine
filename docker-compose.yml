services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mongo:
    image: mongo:7.0
    container_name: pricing-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-pricing_db}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pricing-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pricing-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # external access (host machine)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: internal (between containers) + external (host machine)
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Creates topics once Kafka is healthy, then exits
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pricing-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - "kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic raw-sentiment-events --partitions 3 --replication-factor 1 && kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic price-adjustment-events --partitions 3 --replication-factor 1 && echo 'Topics created successfully.'"

  # ── Application Services ───────────────────────────────────────────────────

  product-catalog-service:
    build:
      context: ./product-catalog-service
      dockerfile: Dockerfile
    container_name: pricing-catalog-service
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      PRICING_COOLDOWN_SECONDS: ${PRICING_COOLDOWN_SECONDS:-30}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  ai-sentiment-consumer:
    build:
      context: ./ai-sentiment-consumer
      dockerfile: Dockerfile
    container_name: pricing-ai-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      AI_CONSUMER_POLL_INTERVAL_MS: ${AI_CONSUMER_POLL_INTERVAL_MS:-1000}
    restart: on-failure

  event-simulator:
    build:
      context: ./event-simulator
      dockerfile: Dockerfile
    container_name: pricing-event-simulator
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      product-catalog-service:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SIMULATOR_PRODUCT_IDS: ${SIMULATOR_PRODUCT_IDS:-}
      SIMULATOR_EVENTS_PER_SECOND: ${SIMULATOR_EVENTS_PER_SECOND:-1}
      CATALOG_SERVICE_URL: http://product-catalog-service:8080
    restart: on-failure

  real-sentiment-fetcher:
    build:
      context: ./real-sentiment-fetcher
      dockerfile: Dockerfile
    container_name: pricing-real-sentiment-fetcher
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      product-catalog-service:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      CATALOG_SERVICE_URL: http://product-catalog-service:8080
      SIMULATOR_PRODUCT_IDS: ${SIMULATOR_PRODUCT_IDS:-}
      FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-300}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-sentiment-fetcher/1.0}
      REDDIT_SUBREDDITS: ${REDDIT_SUBREDDITS:-gadgets,headphones,tech,Electronics,buildapc}
    restart: on-failure

volumes:
  mongo-data:
